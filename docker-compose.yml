version: '3.8'

services:
  autoclip-web:
    build: .
    image: ghcr.io/madajabbar/autoclip-lite:latest
    container_name: autoclip-web
    ports:
      - "3001:3001"
    volumes:
      - ./data:/app/data
      - ./public/autoclip-results:/app/public/autoclip-results
      - ./public/uploads:/app/public/uploads
      - ./public/temp:/app/public/temp
    restart: always
    environment:
      - FASTAPI_URL=http://autoclip-api:8000
      - DB_PATH=/app/data/autoclip.db
    env_file:
      - .env.local

  autoclip-api:
    build: .
    image: ghcr.io/madajabbar/autoclip-lite:latest
    container_name: autoclip-api
    ports:
      - "8000:8000"
    command: ["sh", "-c", "cd src/lib/fastapi && uvicorn main:app --host 0.0.0.0 --port 8000"]
    volumes:
      - ./public/autoclip-results:/app/public/autoclip-results
      - ./public/temp:/app/public/temp
    restart: always
    env_file:
      - .env.local
